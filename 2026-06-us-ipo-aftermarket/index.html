<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>US IPO Aftermarket Performance</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0e1116;
  --bg-raised: #161b22;
  --bg-card: #1a2029;
  --line: #2a313c;
  --ink: #e8ecf1;
  --ink-dim: #9aa6b4;
  --ink-faint: #6b7787;
  --accent: #e0a346;
  --accent-soft: rgba(224, 163, 70, 0.14);
  --error: #f87171;
  --mono: "IBM Plex Mono", ui-monospace, monospace;
  --sans: "IBM Plex Sans", system-ui, sans-serif;
  --serif: "Fraunces", Georgia, serif;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  background-image:
    radial-gradient(circle at 12% -5%, rgba(224, 163, 70, 0.05), transparent 40%),
    radial-gradient(circle at 88% 105%, rgba(224, 163, 70, 0.04), transparent 45%);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 24px;
}
.card {
  width: 100%;
  max-width: 420px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 36px 34px 30px;
  box-shadow: 0 18px 48px rgba(0, 0, 0, 0.42);
}
.kicker {
  font-family: var(--mono);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--accent);
  margin: 0 0 14px;
}
.title {
  font-family: var(--serif);
  font-weight: 500;
  font-size: 26px;
  line-height: 1.18;
  letter-spacing: -0.01em;
  margin: 0 0 12px;
  color: var(--ink);
}
.subtitle {
  font-size: 13.5px;
  color: var(--ink-dim);
  margin: 0 0 26px;
}
form { margin: 0; }
.field {
  position: relative;
}
input[type="password"] {
  width: 100%;
  background: var(--bg-raised);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--ink);
  font-family: var(--mono);
  font-size: 14px;
  padding: 12px 14px;
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
input[type="password"]::placeholder { color: var(--ink-faint); }
input[type="password"]:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
button {
  width: 100%;
  margin-top: 14px;
  background: var(--accent);
  color: #1a1206;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  border: none;
  border-radius: 8px;
  padding: 12px 14px;
  cursor: pointer;
  transition: background 0.15s ease, opacity 0.15s ease;
}
button:hover { background: #edb45b; }
button:disabled { opacity: 0.6; cursor: default; }
.error {
  display: none;
  color: var(--error);
  font-size: 12.5px;
  margin-top: 12px;
}
.error.show { display: block; }
.footer {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.05em;
  color: var(--ink-faint);
  margin: 24px 0 0;
  text-align: center;
}
</style>
</head>
<body>
  <main class="card">
    <p class="kicker">TABULA RESEARCH</p>
    <h1 class="title">US IPO Aftermarket Performance</h1>
    <p class="subtitle">This research dashboard is access-protected. Enter the password to continue.</p>
    <form id="gate-form" autocomplete="off">
      <div class="field">
        <input type="password" id="pw" placeholder="Password" autofocus autocomplete="current-password" aria-label="Password" />
      </div>
      <button type="submit" id="unlock">Unlock</button>
      <p class="error" id="error" role="alert">Incorrect password. Please try again.</p>
    </form>
    <p class="footer">Tabula Research &middot; access-controlled</p>
  </main>

<script>
(function () {
  "use strict";

  const form = document.getElementById("gate-form");
  const input = document.getElementById("pw");
  const button = document.getElementById("unlock");
  const errorEl = document.getElementById("error");

  // Decode a standard base64 string into a Uint8Array.
  function b64ToBytes(b64) {
    const bin = atob(b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  // Derive an AES-256-GCM key from the password using PBKDF2-HMAC-SHA256.
  // Parameters must mirror the Python encryptor exactly.
  async function deriveKey(password, salt, iterations) {
    const baseKey = await crypto.subtle.importKey(
      "raw",
      new TextEncoder().encode(password),
      { name: "PBKDF2" },
      false,
      ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: salt, iterations: iterations, hash: "SHA-256" },
      baseKey,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
  }

  async function attemptUnlock(password) {
    const salt = b64ToBytes(PAYLOAD.salt);
    const iv = b64ToBytes(PAYLOAD.iv);
    const ct = b64ToBytes(PAYLOAD.ct);
    const key = await deriveKey(password, salt, PAYLOAD.iter);
    // Throws (OperationError) on GCM tag mismatch -> wrong password.
    const plainBuf = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, key, ct);
    return new TextDecoder().decode(plainBuf);
  }

  function showError() {
    errorEl.classList.add("show");
    input.value = "";
    input.focus();
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    const password = input.value;
    if (!password) {
      input.focus();
      return;
    }
    errorEl.classList.remove("show");
    button.disabled = true;
    const originalLabel = button.textContent;
    button.textContent = "Decrypting…";

    try {
      const html = await attemptUnlock(password);
      // Replace the document with the decrypted dashboard. document.write
      // re-executes the dashboard's inline + CDN scripts (ECharts).
      document.open();
      document.write(html);
      document.close();
    } catch (err) {
      // GCM tag mismatch on wrong password, or any decrypt failure. Reveal nothing.
      button.disabled = false;
      button.textContent = originalLabel;
      showError();
    }
  });

  input.focus();
})();
</script>
